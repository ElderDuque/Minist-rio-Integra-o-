<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministério de Acolhimento</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8a6e2f;
    --cream: #fdf8ef;
    --brown-dark: #1a1108;
    --brown-mid: #2e1f0a;
    --brown-light: #4a3015;
    --text-dark: #1a1108;
    --text-muted: #7a6040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--brown-dark);
    min-height: 100vh;
    color: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.08) 0%, transparent 50%);
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto 0;
  }

  .cross-icon {
    font-size: 2.2rem;
    color: var(--gold);
    display: block;
    margin-bottom: 10px;
    animation: glow 3s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 8px rgba(201,168,76,0.4); }
    to   { text-shadow: 0 0 20px rgba(201,168,76,0.9), 0 0 40px rgba(201,168,76,0.3); }
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--gold);
    letter-spacing: 0.08em;
    font-weight: 700;
    line-height: 1.2;
  }

  .header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ===== NAV TABS ===== */
  .nav-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 0 20px 30px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    overflow: hidden;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .nav-tab {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.3s;
  }

  .nav-tab.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--brown-dark);
    font-weight: 700;
  }

  .nav-tab:not(:last-child) {
    border-right: 1px solid rgba(201,168,76,0.25);
  }

  /* ===== VIEWS ===== */
  .view { display: none; animation: fadeIn 0.4s ease; }
  .view.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== FORM CARD ===== */
  .form-card {
    background: linear-gradient(145deg, rgba(46,31,10,0.9), rgba(26,17,8,0.95));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 30px 24px;
    margin: 0 16px 30px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
  }

  .field-group {
    margin-bottom: 18px;
  }

  .field-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 7px;
    font-weight: 700;
  }

  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 12px 15px;
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    transition: all 0.25s;
    outline: none;
    -webkit-appearance: none;
  }

  .field-group select option {
    background: var(--brown-mid);
    color: var(--cream);
  }

  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .field-group input::placeholder,
  .field-group textarea::placeholder {
    color: rgba(250,248,239,0.2);
  }

  .field-group textarea {
    resize: none;
    height: 80px;
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* filhos toggle */
  .toggle-group {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .toggle-btn {
    flex: 1;
    padding: 11px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.25s;
  }

  .toggle-btn.selected {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
    font-weight: 700;
  }

  /* children count */
  .children-count {
    display: none;
    margin-top: 12px;
  }

  .children-count.visible { display: block; }

  /* submit button */
  .btn-submit {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--brown-dark);
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 8px 25px rgba(201,168,76,0.25);
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(201,168,76,0.4);
  }

  .btn-submit:active { transform: translateY(0); }

  /* ===== SUCCESS TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #1a3a1a, #2a5a2a);
    border: 1px solid #4caf50;
    color: #a8e6a8;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== LIST VIEW ===== */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    margin-bottom: 16px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .list-count {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .btn-export {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 0.75rem;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.05em;
  }

  .btn-export:hover {
    background: rgba(201,168,76,0.1);
  }

  .search-bar {
    margin: 0 16px 16px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .search-bar input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 11px 15px;
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.25s;
  }

  .search-bar input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .search-bar input::placeholder { color: rgba(250,248,239,0.2); }

  .visitor-list {
    padding: 0 16px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 40px;
  }

  .visitor-card {
    background: linear-gradient(145deg, rgba(46,31,10,0.9), rgba(26,17,8,0.95));
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
  }

  .visitor-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-2px);
  }

  .visitor-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--gold-dark));
  }

  .visitor-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold-light);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .visitor-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .meta-chip {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 6px;
    padding: 3px 8px;
    color: rgba(250,248,239,0.6);
  }

  .visitor-date {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .btn-delete {
    position: absolute;
    bottom: 12px; right: 14px;
    background: transparent;
    border: none;
    color: rgba(255,80,80,0.5);
    font-size: 0.75rem;
    cursor: pointer;
    transition: color 0.2s;
    padding: 4px;
  }
  .btn-delete:hover { color: #ff5050; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  /* ===== DETAIL MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: linear-gradient(145deg, var(--brown-mid), var(--brown-dark));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 460px;
    animation: slideUp 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 1.1rem;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 16px;
  }

  .detail-row:last-of-type { border-bottom: none; }

  .detail-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    flex-shrink: 0;
  }

  .detail-value {
    font-size: 0.9rem;
    color: var(--cream);
    text-align: right;
  }

  .btn-close-modal {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-close-modal:hover { background: rgba(201,168,76,0.1); }
</style>
</head>
<body>

<div class="header">
  <span class="cross-icon">✝</span>
  <h1>Ministério de Acolhimento</h1>
  <p>Cadastro de Visitantes</p>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('form')">✏️ Cadastrar</button>
  <button class="nav-tab" onclick="switchTab('list')">📋 Visitantes</button>
</div>

<!-- FORM VIEW -->
<div class="view active" id="view-form">
  <div class="form-card">
    <div class="section-label">Dados Pessoais</div>

    <div class="field-group">
      <label>Nome Completo *</label>
      <input type="text" id="nome" placeholder="Ex: Maria da Silva" maxlength="80">
    </div>

    <div class="row-2">
      <div class="field-group">
        <label>Idade *</label>
        <input type="number" id="idade" placeholder="Ex: 32" min="1" max="120">
      </div>
      <div class="field-group">
        <label>Estado Civil *</label>
        <select id="estado_civil">
          <option value="">Selecione</option>
          <option>Solteiro(a)</option>
          <option>Casado(a)</option>
          <option>Divorciado(a)</option>
          <option>Viúvo(a)</option>
          <option>União Estável</option>
        </select>
      </div>
    </div>

    <div class="section-label" style="margin-top:6px;">Contato</div>

    <div class="field-group">
      <label>WhatsApp *</label>
      <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" maxlength="20">
    </div>

    <div class="field-group">
      <label>Endereço (opcional)</label>
      <textarea id="endereco" placeholder="Rua, bairro, cidade..."></textarea>
    </div>

    <div class="section-label" style="margin-top:6px;">Família</div>

    <div class="field-group">
      <label>Tem Filhos?</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-sim" onclick="toggleFilhos('Sim')">👶 Sim</button>
        <button class="toggle-btn" id="btn-nao" onclick="toggleFilhos('Não')">— Não</button>
      </div>
      <div class="children-count" id="children-count">
        <div class="field-group" style="margin-top:10px;margin-bottom:0">
          <label>Quantos filhos?</label>
          <input type="number" id="num_filhos" placeholder="Ex: 2" min="1" max="30">
        </div>
      </div>
    </div>

    <div class="field-group">
      <label>Observações (opcional)</label>
      <textarea id="obs" placeholder="Pedido de oração, como conheceu a igreja..."></textarea>
    </div>

    <button class="btn-submit" onclick="salvarVisitante()">✝ Registrar Visitante</button>
  </div>
</div>

<!-- LIST VIEW -->
<div class="view" id="view-list">
  <div class="list-header">
    <span class="list-count" id="list-count">0 visitantes</span>
    <button class="btn-export" onclick="exportarCSV()">⬇ Exportar CSV</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 Buscar por nome..." oninput="renderList()">
  </div>
  <div class="visitor-list" id="visitor-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-title" id="modal-name"></div>
    <div id="modal-body"></div>
    <button class="btn-close-modal" onclick="closeModalDirect()">Fechar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✅ Visitante cadastrado!</div>

<script>
  let visitors = JSON.parse(localStorage.getItem('acolhimento_visitors') || '[]');
  let temFilhos = null;

  function switchTab(tab) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'list') renderList();
  }

  function toggleFilhos(val) {
    temFilhos = val;
    document.getElementById('btn-sim').classList.toggle('selected', val === 'Sim');
    document.getElementById('btn-nao').classList.toggle('selected', val === 'Não');
    document.getElementById('children-count').classList.toggle('visible', val === 'Sim');
  }

  function salvarVisitante() {
    const nome = document.getElementById('nome').value.trim();
    const idade = document.getElementById('idade').value.trim();
    const estado_civil = document.getElementById('estado_civil').value;
    const whatsapp = document.getElementById('whatsapp').value.trim();

    if (!nome || !idade || !estado_civil || !whatsapp) {
      showToast('⚠️ Preencha os campos obrigatórios!', '#5a3a00', '#c9a84c');
      return;
    }

    const num_filhos = temFilhos === 'Sim' ? (document.getElementById('num_filhos').value || '—') : null;

    const visitor = {
      id: Date.now(),
      nome,
      idade,
      estado_civil,
      whatsapp,
      endereco: document.getElementById('endereco').value.trim() || '—',
      filhos: temFilhos || '—',
      num_filhos: num_filhos,
      obs: document.getElementById('obs').value.trim() || '—',
      data: new Date().toLocaleDateString('pt-BR')
    };

    visitors.unshift(visitor);
    localStorage.setItem('acolhimento_visitors', JSON.stringify(visitors));
    showToast('✅ Visitante cadastrado com sucesso!');
    resetForm();
  }

  function resetForm() {
    ['nome','idade','whatsapp','endereco','num_filhos','obs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('estado_civil').value = '';
    temFilhos = null;
    document.getElementById('btn-sim').classList.remove('selected');
    document.getElementById('btn-nao').classList.remove('selected');
    document.getElementById('children-count').classList.remove('visible');
  }

  function renderList() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = visitors.filter(v => v.nome.toLowerCase().includes(q));
    const container = document.getElementById('visitor-list');
    document.getElementById('list-count').textContent = `${visitors.length} visitante${visitors.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">🕊️</div><p>${visitors.length === 0 ? 'Nenhum visitante cadastrado ainda.<br>Use o formulário para registrar.' : 'Nenhum resultado encontrado.'}</p></div>`;
      return;
    }

    container.innerHTML = filtered.map(v => `
      <div class="visitor-card" onclick="openModal(${v.id})">
        <span class="visitor-date">${v.data}</span>
        <div class="visitor-name">${v.nome}</div>
        <div class="visitor-meta">
          <span class="meta-chip">🎂 ${v.idade} anos</span>
          <span class="meta-chip">💍 ${v.estado_civil}</span>
          <span class="meta-chip">👶 Filhos: ${v.filhos}</span>
        </div>
        <button class="btn-delete" onclick="deletar(event, ${v.id})">🗑 excluir</button>
      </div>
    `).join('');
  }

  function deletar(e, id) {
    e.stopPropagation();
    if (!confirm('Excluir este visitante?')) return;
    visitors = visitors.filter(v => v.id !== id);
    localStorage.setItem('acolhimento_visitors', JSON.stringify(visitors));
    renderList();
  }

  function openModal(id) {
    const v = visitors.find(x => x.id === id);
    if (!v) return;
    document.getElementById('modal-name').textContent = v.nome;
    document.getElementById('modal-body').innerHTML = `
      ${row('📅 Data', v.data)}
      ${row('🎂 Idade', v.idade + ' anos')}
      ${row('💍 Estado Civil', v.estado_civil)}
      ${row('📱 WhatsApp', v.whatsapp)}
      ${row('📍 Endereço', v.endereco)}
      ${row('👶 Filhos', v.filhos === 'Sim' ? `Sim (${v.num_filhos || '?'})` : v.filhos)}
      ${row('📝 Observações', v.obs)}
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function row(label, value) {
    return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value || '—'}</span></div>`;
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function exportarCSV() {
    if (visitors.length === 0) { showToast('⚠️ Nenhum visitante para exportar.', '#5a3a00', '#c9a84c'); return; }
    const header = ['Nome','Idade','Estado Civil','WhatsApp','Endereço','Filhos','Qtd Filhos','Observações','Data'];
    const rows = visitors.map(v => [v.nome, v.idade, v.estado_civil, v.whatsapp, v.endereco, v.filhos, v.num_filhos || '', v.obs, v.data].map(c => `"${(c||'').replace(/"/g,'""')}"`));
    const csv = [header, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `visitantes_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
    a.click();
  }

  function showToast(msg, bg, border) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    if (bg) t.style.background = bg;
    if (border) t.style.borderColor = border;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
